name: "🐛 Bug Report"
description: "Report a bug or unexpected behavior in Vyzora"
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        Please provide as much detail as possible so we can reproduce and fix it quickly.

  - type: input
    id: summary
    attributes:
      label: "Bug Summary"
      description: "A short, clear description of the bug"
      placeholder: "e.g. Event ingestion returns 500 when payload is missing projectId"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: "Affected Component"
      options:
        - "Backend API"
        - "Frontend Dashboard"
        - "Runtime SDK"
        - "Documentation"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce"
      description: "Step by step instructions to reproduce the bug"
      placeholder: |
        1. Send a POST to /api/ingest with payload { ... }
        2. Observe the response
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
      placeholder: "The API should return 200 with { success: true }"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "Actual Behavior"
      placeholder: "Returns 500 with 'Internal server error'"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: "Environment"
      description: "Node version, OS, browser (if frontend)"
      placeholder: |
        - Node: 20.11.0
        - OS: macOS 14.4
        - npm: 10.2.4
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "Relevant Logs / Screenshots"
      description: "Paste any error logs or stack traces here"
      render: "shell"
